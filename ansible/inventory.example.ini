# Example inventory. Copy to inventory.ini and adjust.
# Supply secrets via Vault or ansible-vault — never store credentials here.

[network_devices]
edge-rtr-01  ansible_host=10.10.10.1
core-sw-01   ansible_host=10.10.10.2
dist-sw-01   ansible_host=10.10.10.3

[network_devices:vars]
ansible_network_os=cisco.ios.ios
ansible_connection=network_cli
ansible_user=audit_ro
# Use a dedicated READ-ONLY AAA account (TACACS+/RADIUS) for the auditor.
