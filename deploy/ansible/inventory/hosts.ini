# Two HP ProLiant nodes, active-passive. Authenticate with SSH KEYS only.
# Do NOT use the password that was shared in chat — rotate it and disable
# password auth (the hardening role enforces this).

[proliant]
proliant-1 ansible_host=10.10.173.22 vip_state=MASTER vip_priority=150 pg_role=primary
proliant-2 ansible_host=10.10.173.23 vip_state=BACKUP vip_priority=100 pg_role=standby

[proliant:vars]
ansible_user=audit_admin
ansible_ssh_private_key_file=~/.ssh/audit_admin_ed25519
ansible_python_interpreter=/usr/bin/python3
