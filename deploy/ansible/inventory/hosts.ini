# Two HP ProLiant nodes, active-passive. Authenticate with SSH KEYS only.
# Do NOT use the password that was shared in chat — rotate it and disable
# password auth (the hardening role enforces this).
#
# ansible_host uses the STATIC eno2 back-to-back link (192.168.99.0/24), NOT the
# DHCP eno1 LAN address (which drifts — that's why .22/.23 became .43/.44). All
# cluster-internal traffic (replication, pg_hba, VRRP, node_exporter) follows
# ansible_host, so pinning it here keeps the cluster stable across DHCP changes.
# Run the playbook FROM node 1 (e.g. the Cockpit terminal): it reaches itself on
# 192.168.99.1 and the peer on 192.168.99.2 over this dedicated link.

[proliant]
proliant-1 ansible_host=192.168.99.1 vip_state=MASTER vip_priority=150 pg_role=primary
proliant-2 ansible_host=192.168.99.2 vip_state=BACKUP vip_priority=100 pg_role=standby

[proliant:vars]
ansible_user=audit_admin
ansible_ssh_private_key_file=~/.ssh/audit_admin_ed25519
ansible_python_interpreter=/usr/bin/python3
