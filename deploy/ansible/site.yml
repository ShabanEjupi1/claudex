---
# Deploy the audit platform across both ProLiant nodes (active-passive).
#
#   ansible-galaxy collection install -r requirements.yml
#   ansible-vault create group_vars/vault.yml   # see vault.example.yml
#   ansible-playbook site.yml --ask-vault-pass
#
# Order matters: harden first, then DB, then app, then the web/VIP front.

- name: Audit platform
  hosts: proliant
  become: true
  vars_files:
    - group_vars/vault.yml
  roles:
    - hardening
    - tls
    - postgres
    - app
    - nginx
    - keepalived
    - monitoring
    # Public reachability via outbound-only Cloudflare Tunnel (no inbound ports).
    # Enable per deploy/CLOUDFLARE-TUNNEL.md; no-op while disabled.
    - role: cloudflared
      when: cloudflare_tunnel_enabled | default(false)
