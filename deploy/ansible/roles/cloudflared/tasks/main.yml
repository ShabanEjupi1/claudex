---
# Cloudflare Tunnel connector for the dashboard. Outbound-only: no inbound
# firewall ports, no router changes, WAN IP never exposed. Runs on BOTH nodes
# with the SAME tunnel token -> two connectors -> automatic HA via Cloudflare.
#
# This is the REMOTELY-MANAGED (token) style: public-hostname routing
# (audit.spacecode.tech -> http://localhost:8002) is configured in the Cloudflare
# Zero Trust dashboard, not here. See deploy/CLOUDFLARE-TUNNEL.md.

- name: Add Cloudflare package repo
  ansible.builtin.get_url:
    url: https://pkg.cloudflare.com/cloudflared.repo
    dest: /etc/yum.repos.d/cloudflared.repo
    mode: "0644"

- name: Install cloudflared
  ansible.builtin.dnf:
    name: cloudflared
    state: present

- name: Create unprivileged cloudflared system user
  ansible.builtin.user:
    name: cloudflared
    system: true
    shell: /sbin/nologin
    home: /etc/cloudflared
    create_home: false

- name: Create cloudflared config dir
  ansible.builtin.file:
    path: /etc/cloudflared
    state: directory
    owner: root
    group: cloudflared
    mode: "0750"

- name: Install connector token env file (secret — from vault)
  ansible.builtin.template:
    src: cloudflared.env.j2
    dest: /etc/cloudflared/cloudflared.env
    owner: root
    group: cloudflared
    mode: "0640"
  no_log: true
  notify: restart cloudflared

- name: Install cloudflared systemd unit
  ansible.builtin.template:
    src: cloudflared.service.j2
    dest: /etc/systemd/system/cloudflared.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart cloudflared

- name: Enable + start cloudflared
  ansible.builtin.systemd:
    name: cloudflared
    state: started
    enabled: true
    daemon_reload: true
